# ============================================================
# T3 Default Experiment Configuration
# ============================================================
# Single source of truth. All experimental parameters here.
# No hardcoded values in Python execution code.

experiment:
  name: "default"
  description: "Default configuration for T3 ablation experiments"
  tags: []
  seed: 42

models:
  generation:
    - name: "gpt-4.1-nano"
      temperature: 0.0
      max_tokens: 4096
      top_p: 1.0

  evaluator:
    name: "gpt-5.4-mini"
    temperature: 0.0
    max_tokens: 1024
    max_task_chars: 800
    max_code_chars: 2000
    max_reasoning_chars: 1000

  failure_classifier:
    name: null  # uses evaluator model

conditions:
  baseline:
    retry:
      enabled: false
    contract:
      enabled: false
    critique:
      enabled: false
    prompt_template: "baseline"

  diagnostic:
    retry:
      enabled: false
    prompt_template: "diagnostic"

  guardrail:
    retry:
      enabled: false
    prompt_template: "guardrail"

  guardrail_strict:
    retry:
      enabled: false
    prompt_template: "guardrail_strict"

  counterfactual:
    retry:
      enabled: false
    prompt_template: "counterfactual"

  reason_then_act:
    retry:
      enabled: false
    prompt_template: "reason_then_act"

  self_check:
    retry:
      enabled: false
    prompt_template: "self_check"

  counterfactual_check:
    retry:
      enabled: false
    prompt_template: "counterfactual_check"

  test_driven:
    retry:
      enabled: false
    prompt_template: "test_driven"

  repair_loop:
    retry:
      enabled: true
      max_attempts: 2
    prompt_template: "diagnostic"

  retry_no_contract:
    retry:
      enabled: true
      max_attempts: 5
      feedback:
        include_test_output: true
        include_critique: false
        include_previous_code: true
    contract:
      enabled: false
    prompt_template: "baseline"

  retry_with_contract:
    retry:
      enabled: true
      max_attempts: 5
      feedback:
        include_test_output: true
        include_critique: false
        include_previous_code: true
    contract:
      enabled: true
    prompt_template: "contract_gated"

  retry_adaptive:
    retry:
      enabled: true
      max_attempts: 5
      feedback:
        include_test_output: true
        include_critique: true
        include_previous_code: true
      stopping:
        stop_on_stagnation: true
        stagnation_window: 3
    contract:
      enabled: false
    prompt_template: "baseline"

  retry_alignment:
    retry:
      enabled: true
      max_attempts: 5
      feedback:
        include_test_output: true
        include_critique: true
        include_previous_code: true
    contract:
      enabled: true
    critique:
      enabled: true
    prompt_template: "alignment"

  leg_reduction:
    retry:
      enabled: false
    prompt_template: "leg_reduction"

  contract_gated:
    retry:
      enabled: false
    contract:
      enabled: true
    prompt_template: "contract_gated"

prompts:
  output_format: "v2"  # "v1" or "v2"

cases:
  source: "cases_v2.json"
  mode: "all"
  max_cases: 0

retry_defaults:
  max_attempts: 5
  similarity_threshold: 0.95
  score_epsilon: 0.05
  persistence_escalation_count: 2
  max_iteration_seconds: 60
  max_total_seconds: 360
  feedback:
    include_test_output: true
    include_critique: false
    include_previous_code: true
  stopping:
    stop_on_pass: true
    stop_on_stagnation: false

evaluation:
  execution_mode: "in_process"  # "subprocess" or "in_process"
  subprocess_timeout: 30
  leg:
    enabled: true
  failure_classification:
    enabled: true
  alignment:
    enabled: true

execution:
  num_workers: 1
  token_budgets:
    "gpt-4.1-nano": 12000
    "gpt-4o-mini": 12000
    "gpt-5-mini": 16000
    "gpt-5.4-mini": 16000
    default: 10000
  v3_pipeline:
    import_summary: false
    file_ordering: "dependency"

logging:
  level: "INFO"
  output_dir: "logs/"
  store:
    raw_prompts: true
    raw_outputs: true
    generated_code: true
    execution_traces: true
  redis:
    enabled: false
    url: "redis://localhost:6379/0"
    stream_maxlen: 100000

trials: 1
