experiment:
  name: "smoke_vskarich_baseline_leg"
  description: "Smoke test: gpt-4o-mini generation, gpt-5-mini evaluation, baseline + leg_reduction on all v2 cases"
  tags: ["smoke", "baseline", "leg_reduction"]
  seed: 42

models:
  generation:
    - name: "gpt-4o-mini"
      temperature: 0.0
      max_tokens: 4096
      top_p: 1.0

  evaluator:
    name: "gpt-5-mini"
    temperature: 0.0
    max_tokens: 1024
    max_task_chars: 800
    max_code_chars: 2000
    max_reasoning_chars: 1000

conditions:
  baseline:
    retry:
      enabled: false
    prompt_template: "baseline"

  leg_reduction:
    retry:
      enabled: false
    prompt_template: "leg_reduction"

cases:
  source: "cases_vskarich_test.json"
  mode: "all"
  max_cases: 1

evaluation:
  execution_mode: "in_process"
  subprocess_timeout: 30
  leg:
    enabled: true
  failure_classification:
    enabled: true
  alignment:
    enabled: true

execution:
  num_workers: 1
  token_budgets:
    "gpt-4.1-nano": 12000
    "gpt-4o-mini": 12000
    default: 10000
  v3_pipeline:
    import_summary: false
    file_ordering: "dependency"

prompts:
  output_format: "v2"

logging:
  level: "INFO"
  output_dir: "logs/"
  store:
    raw_prompts: true
    raw_outputs: true
  redis:
    enabled: false

trials: 1
