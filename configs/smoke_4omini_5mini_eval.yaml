experiment:
  name: "smoke_4omini_gen_5mini_eval"
  description: "gpt-4o-mini generation, gpt-5-mini evaluation, baseline + leg_reduction, all v2 cases"
  tags: ["smoke", "baseline", "leg_reduction", "gpt-4o-mini"]
  seed: 42

models:
  generation:
    - name: "gpt-4o-mini"
      temperature: 0.0
      max_tokens: 4096
      top_p: 1.0

  evaluator:
    name: "gpt-5-mini"
    temperature: 0.0
    max_tokens: 1024
    max_task_chars: 800
    max_code_chars: 2000
    max_reasoning_chars: 1000

conditions:
  baseline:
    retry:
      enabled: false
    prompt_template: "baseline"

  leg_reduction:
    retry:
      enabled: false
    prompt_template: "leg_reduction"

cases:
  source: "cases_v2.json"
  mode: "all"
  max_cases: 0

evaluation:
  execution_mode: "in_process"
  subprocess_timeout: 30
  leg:
    enabled: true
  failure_classification:
    enabled: true
  alignment:
    enabled: true

execution:
  num_workers: 6
  token_budgets:
    "gpt-4o-mini": 12000
    "gpt-5-mini": 16000
    default: 10000
  v3_pipeline:
    import_summary: false
    file_ordering: "dependency"

prompts:
  output_format: "v2"

logging:
  level: "INFO"
  output_dir: "logs/"
  store:
    raw_prompts: true
    raw_outputs: true
  redis:
    enabled: true
    url: "redis://localhost:6379/0"
    stream_maxlen: 100000

trials: 1
