rules:
  # 1. No silent except — swallowing exceptions hides bugs
  - id: no-silent-except-pass
    pattern: |
      try:
          ...
      except $EX:
          pass
    message: "Silent 'except: pass' swallows errors. Log or re-raise."
    languages: [python]
    severity: ERROR

  # 2. No ThreadPoolExecutor (process isolation only)
  - id: no-thread-pool-executor
    pattern: ThreadPoolExecutor(...)
    message: "ThreadPoolExecutor is forbidden. Use process-based parallelism."
    languages: [python]
    severity: ERROR
    paths:
      exclude:
        - tests/
        - _archive/

  # 3. No threading module import
  - id: no-threading-import
    pattern: import threading
    message: "threading module is forbidden. Use process-based parallelism."
    languages: [python]
    severity: ERROR
    paths:
      exclude:
        - tests/
        - _archive/

  # 4. No direct OpenAI client construction outside llm.py
  - id: no-direct-openai-client
    pattern: OpenAI(...)
    message: "Direct OpenAI client construction forbidden outside llm.py. Use llm.call_model()."
    languages: [python]
    severity: ERROR
    paths:
      exclude:
        - llm.py
        - llm_mock.py
        - tests/

  # 5. No wildcard imports
  - id: no-wildcard-import
    pattern: from $MODULE import *
    message: "Wildcard imports are forbidden. Import specific names."
    languages: [python]
    severity: ERROR

  # 6. No mutable default arguments (list)
  - id: no-mutable-default-list
    pattern: "def $FUNC(..., $ARG=[], ...):\n    ..."
    message: "Mutable default argument (list). Use None and initialize inside."
    languages: [python]
    severity: ERROR

  # 7. No mutable default arguments (dict)
  - id: no-mutable-default-dict
    pattern: "def $FUNC(..., $ARG={}, ...):\n    ..."
    message: "Mutable default argument (dict). Use None and initialize inside."
    languages: [python]
    severity: ERROR

  # 8. No mutable default arguments (set)
  - id: no-mutable-default-set
    pattern: "def $FUNC(..., $ARG=set(), ...):\n    ..."
    message: "Mutable default argument (set). Use None and initialize inside."
    languages: [python]
    severity: ERROR

  # -----------------------------
  # 1. Silent failures (exceptions swallowed)
  # -----------------------------
  - id: silent-except-pass
    patterns:
      - pattern: |
          try:
            ...
          except:
            pass
    message: "Silent exception swallowing (except: pass)"
    severity: ERROR
    languages: [ python ]

  - id: silent-except-generic
    patterns:
      - pattern: |
          try:
            ...
          except Exception:
            ...
    message: "Catching broad Exception may hide failures"
    severity: WARNING
    languages: [ python ]

  # -----------------------------
  # 2. Mutable default arguments
  # -----------------------------
  - id: mutable-default-list
    pattern: |
      def $F(..., $X=[], ...):
        ...
    message: "Mutable default list argument (state leakage across calls)"
    severity: ERROR
    languages: [ python ]

  - id: mutable-default-dict
    pattern: |
      def $F(..., $X={}, ...):
        ...
    message: "Mutable default dict argument (state leakage across calls)"
    severity: ERROR
    languages: [ python ]

  # -----------------------------
  # 3. Hidden mutation / aliasing
  # -----------------------------
  - id: return-global-mutable
    pattern: |
      return $GLOBAL
    message: "Returning global mutable object (aliasing risk)"
    severity: WARNING
    languages: [ python ]
    metavariable-pattern:
      metavariable: $GLOBAL
      pattern: $X

  - id: assign-alias
    pattern: |
      $Y = $X
    message: "Possible aliasing (shared reference instead of copy)"
    severity: INFO
    languages: [ python ]

  # -----------------------------
  # 4. Missing copy on dict/list
  # -----------------------------
  - id: no-copy-dict-return
    patterns:
      - pattern: |
          return $X
      - pattern-not: |
          return $X.copy()
    message: "Returning dict without copy (potential shared state)"
    severity: WARNING
    languages: [ python ]

  # -----------------------------
  # 5. Partial state updates
  # -----------------------------
  - id: partial-dict-update
    pattern: |
      $D["$KEY"] = $VAL
    message: "Single-field update — check for dependent fields"
    severity: INFO
    languages: [ python ]

  # -----------------------------
  # 6. Cache invalidation missing (heuristic)
  # -----------------------------
  - id: cache-write-no-invalidate
    patterns:
      - pattern: |
          $CACHE[$KEY] = $VAL
      - pattern-not-inside: |
          $CACHE.clear()
    message: "Cache write without invalidation (possible stale cache)"
    severity: WARNING
    languages: [ python ]

  # -----------------------------
  # 7. Use-before-set
  # -----------------------------
  - id: variable-used-before-init
    patterns:
      - pattern: |
          if $COND:
            $X = ...
          ...
          $X
    message: "Variable may be used before assignment"
    severity: WARNING
    languages: [ python ]

  # -----------------------------
  # 8. Side-effect ordering
  # -----------------------------
  - id: side-effect-after-loop
    pattern: |
      for $X in $ITER:
        ...
      $FUNC(...)
    message: "Side effect outside loop — may violate per-item invariant"
    severity: INFO
    languages: [ python ]

  # -----------------------------
  # 9. Wrong condition (common LLM bug)
  # -----------------------------
  - id: suspicious-comparison
    pattern: |
      if $X > $Y:
        ...
    message: "Check boundary condition (>, >= confusion)"
    severity: INFO
    languages: [ python ]

  # -----------------------------
  # 10. Non-functional style violations
  # -----------------------------
  - id: inplace-mutation-list
    pattern: |
      $X.append($Y)
    message: "In-place mutation — prefer functional style"
    severity: INFO
    languages: [ python ]

  - id: inplace-mutation-dict
    pattern: |
      $X[$K] = $V
    message: "Dict mutation — consider returning new object"
    severity: INFO
    languages: [ python ]

  # -----------------------------
  # 11. Implicit None return
  # -----------------------------
  - id: implicit-none-return
    pattern: |
      def $F(...):
        ...
    message: "Function may implicitly return None"
    severity: INFO
    languages: [ python ]

  # -----------------------------
  # 12. Dead code (LLM hallucination artifact)
  # -----------------------------
  - id: unreachable-code-after-return
    pattern: |
      return ...
      ...
    message: "Unreachable code after return"
    severity: WARNING
    languages: [ python ]

  # -----------------------------
  # 13. Debug leftovers
  # -----------------------------
  - id: debug-print
    pattern: print(...)
    message: "Debug print left in code"
    severity: INFO
    languages: [ python ]

  # ---- HARD FAILS ----
  - id: no-bare-except
    pattern: |
      try:
        ...
      except:
        ...
    message: "Bare except is forbidden"
    severity: ERROR
    languages: [python]

  - id: no-swallowed-exception
    patterns:
      - pattern: |
          try:
            ...
          except Exception:
            pass
    message: "Exception swallowed (pass)"
    severity: ERROR
    languages: [python]

  - id: no-broad-except-without-reraise
    patterns:
      - pattern: |
          try:
            ...
          except Exception as $E:
            ...
      - pattern-not: |
          try:
            ...
          except Exception as $E:
            raise
    message: "Broad exception without re-raise"
    severity: WARNING
    languages: [python]

  - id: no-global-state
    pattern: |
      global $X
    message: "Global state is forbidden"
    severity: ERROR
    languages: [python]

  - id: no-mutable-default-list
    pattern: |
      def $F(..., $X=[], ...):
        ...
    message: "Mutable default list"
    severity: ERROR
    languages: [python]

  - id: no-mutable-default-dict
    pattern: |
      def $F(..., $X={}, ...):
        ...
    message: "Mutable default dict"
    severity: ERROR
    languages: [python]

  - id: no-dynamic-import
    pattern: |
      def $F(...):
        ...
        from $M import $X
    message: "Dynamic import inside function"
    severity: WARNING
    languages: [python]

  - id: no-silent-fallback-return
    patterns:
      - pattern: |
          except ...:
            return $X
    message: "Silent fallback return in exception"
    severity: WARNING
    languages: [python]

  - id: no-logging-only-error-handling
    patterns:
      - pattern: |
          except Exception as $E:
            $LOG.debug(...)
    message: "Error handled only by logging"
    severity: WARNING
    languages: [python]

  - id: no-unchecked-api-response
    pattern: |
      return $X.output_text
    message: "Unchecked API response (no validation)"
    severity: WARNING
    languages: [python]

  - id: no-inplace-list-mutation
    pattern: |
      $X.append($Y)
    message: "In-place list mutation discouraged"
    severity: INFO
    languages: [python]

  - id: no-inplace-dict-mutation
    pattern: |
      $X[$K] = $V
    message: "In-place dict mutation discouraged"
    severity: INFO
    languages: [python]

