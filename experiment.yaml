experiment:
  version: 1
  name: "retry_ablation_v2"
  models:
    - "gpt-4o-mini"
    - "gpt-5-mini"

conditions:
  baseline:
    template: "base"
  diagnostic:
    template: "base"
  guardrail:
    template: "base"
  guardrail_strict:
    template: "base"
  counterfactual:
    template: "base"
  reason_then_act:
    template: "base"
  self_check:
    template: "base"
  counterfactual_check:
    template: "base"
  test_driven:
    template: "base"
  repair_loop:
    template: "base"
    retry_template: "repair_feedback"
  scm_descriptive:
    template: "base"
  scm_constrained:
    template: "base"
  scm_constrained_evidence:
    template: "base"
  scm_constrained_evidence_minimal:
    template: "base"
  evidence_only:
    template: "base"
  length_matched_control:
    template: "base"
  structured_reasoning:
    template: "base"
  free_form_reasoning:
    template: "base"
  branching_reasoning:
    template: "base"
  contract_gated:
    template: "contract_elicit"
    next_template: "contract_code"
    retry_template: "contract_retry"
  retry_no_contract:
    template: "base"
    retry_template: "retry"
  retry_with_contract:
    template: "base"
    retry_template: "retry"
  retry_adaptive:
    template: "base"
    retry_template: "retry"
  retry_alignment:
    template: "base"
    retry_template: "retry"
  leg_reduction:
    template: "base"

retry:
  enabled: true
  max_steps: 5
  strategy: "linear"

execution:
  parallel: 1
  cases_file: "cases_v2.json"
  timeout_total_seconds: 360
  timeout_per_step_seconds: 60

logging:
  run_dir_pattern: "ablation_runs/run_{model}_t{trial}_{uuid}"
  log_resolved_config: true
